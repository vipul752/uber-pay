version: '3.8'

services:
  # ─── Databases ───────────────────────────
  postgres-user:
    image: postgres:15
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    networks:
      - uberpay-network

  postgres-ride:
    image: postgres:15
    environment:
      POSTGRES_DB: ridedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata-ride:/var/lib/postgresql/data
    networks:
      - uberpay-network

  postgres-wallet:
    image: postgres:15
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata-wallet:/var/lib/postgresql/data
    networks:
      - uberpay-network

  # ─── Redis ───────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - uberpay-network

  # ─── Kafka ───────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - uberpay-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - uberpay-network

  # ─── Kafka UI ────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - uberpay-network

  # ─── Services ────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    env_file: ./gateway/.env
    depends_on:
      - user-service
      - ride-service
      - wallet-service
      - location-service
    networks:
      - uberpay-network

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    env_file: ./services/user-service/.env
    depends_on:
      - postgres-user
    networks:
      - uberpay-network

  ride-service:
    build: ./services/ride-service
    ports:
      - "3002:3002"
    env_file: ./services/ride-service/.env
    depends_on:
      - postgres-ride
      - kafka
    networks:
      - uberpay-network

  wallet-service:
    build: ./services/wallet-service
    ports:
      - "3003:3003"
    env_file: ./services/wallet-service/.env
    depends_on:
      - postgres-wallet
      - redis
      - kafka
    networks:
      - uberpay-network

  location-service:
    build: ./services/location-service
    ports:
      - "3004:3004"
    env_file: ./services/location-service/.env
    depends_on:
      - redis
      - kafka
    networks:
      - uberpay-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "3005:3005"
    env_file: ./services/notification-service/.env
    depends_on:
      - kafka
    networks:
      - uberpay-network

volumes:
  pgdata-user:
  pgdata-ride:
  pgdata-wallet:

networks:
  uberpay-network:
    driver: bridge
